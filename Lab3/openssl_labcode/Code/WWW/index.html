<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HTTPS Secure Server</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            display: inline-block;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        .status {
            background: #4CAF50;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 HTTPS Secure Server</h1>
        <p>This is a secure web server based on OpenSSL</p>
        <p>SSL/TLS encryption is working correctly!</p>
        <div class="status">
            ✅ Secure Connection Established
        </div>
        <p style="margin-top: 30px; font-size: 14px;">
            Server: OpenSSL HTTPS Server<br>
            Port: 22222
        </p>
    </div>
</body>
</html>
